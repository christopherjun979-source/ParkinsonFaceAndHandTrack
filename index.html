<!DOCTYPE html>
<html>

<head>
    <title>Parkinson Face & Hand Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #09090b;
            color: #fafafa;
            margin: 0;
            padding: 10px;
            overflow: hidden; /* Removes the scroll wheel entirely */
            height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            font-family: Arial, sans-serif;
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a1a1aa;
            text-align: center;
        }

        #control-panel {
            background: #121214;
            padding: 8px 12px;
            margin-bottom: 10px;
            max-width: 960px;
            margin-left: auto;
            margin-right: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .control-label-group {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #a1a1aa;
            letter-spacing: 1px;
            min-width: 150px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            cursor: pointer;
        }

        .toggle-item input[type="checkbox"] {
            accent-color: #fafafa;
            cursor: pointer;
            width: 13px;
            height: 13px;
        }

        #app-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            max-width: 960px;
            margin: 0 auto;
        }

        /* Optimized video tracking canvas to fit safely on standard viewport heights */
        #container {
            position: relative;
            width: 960px;
            height: 540px;
            background: #000;
            overflow: hidden;
        }

        video,
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 960px;
            height: 540px;
            transform: scaleX(-1);
        }

        #fps-counter {
            font-family: Arial, sans-serif;
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(18, 18, 20, 0.85);
            color: #00ff00;
            padding: 3px 6px;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
        }

        .slim-data-bar {
            background: #121214;
            padding: 6px 12px;
            width: 960px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 15px;
            min-height: 34px;
        }

        .panel-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 1px;
            min-width: 150px;
            flex-shrink: 0;
        }

        .horizontal-content-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            flex-grow: 1;
        }

        .status-msg-inline {
            font-family: Arial, sans-serif;
            color: #52525b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .finger-pill {
            background: #18181b;
            padding: 2px 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
        }

        .finger-pill[data-group="Wrist Base"] { border: 1px solid #ef4444; }
        .finger-pill[data-group="Thumb"] { border: 1px solid #f97316; }
        .finger-pill[data-group="Index Finger"] { border: 1px solid #eab308; }
        .finger-pill[data-group="Middle Finger"] { border: 1px solid #22c55e; }
        .finger-pill[data-group="Ring Finger"] { border: 1px solid #3b82f6; }
        .finger-pill[data-group="Pinky Finger"] { border: 1px solid #a855f7; }
        
        .finger-pill[data-group="Face-LeftEye"] { border: 1px solid #22d3ee; }
        .finger-pill[data-group="Face-RightEye"] { border: 1px solid #c084fc; }
        .finger-pill[data-group="Face-Lips"] { border: 1px solid #ef4444; }

        .pill-title {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 9px;
            letter-spacing: 0.5px;
        }

        .finger-pill[data-group="Wrist Base"] .pill-title { color: #ef4444; }
        .finger-pill[data-group="Thumb"] .pill-title { color: #f97316; }
        .finger-pill[data-group="Index Finger"] .pill-title { color: #eab308; }
        .finger-pill[data-group="Middle Finger"] .pill-title { color: #22c55e; }
        .finger-pill[data-group="Ring Finger"] .pill-title { color: #3b82f6; }
        .finger-pill[data-group="Pinky Finger"] .pill-title { color: #a855f7; }
        
        .finger-pill[data-group="Face-LeftEye"] .pill-title { color: #22d3ee; }
        .finger-pill[data-group="Face-RightEye"] .pill-title { color: #c084fc; }
        .finger-pill[data-group="Face-Lips"] .pill-title { color: #ef4444; }

        .pill-coords {
            color: #fafafa;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Parkinson Face & Hand Tracker</h2>

    <div id="control-panel">
        <div class="control-row">
            <span class="control-label-group">Face Modules:</span>
            <label class="toggle-item" style="color: #22d3ee;"><input type="checkbox" id="show-lefteye" checked> Left Eye</label>
            <label class="toggle-item" style="color: #c084fc;"><input type="checkbox" id="show-righteye" checked> Right Eye</label>
            <label class="toggle-item" style="color: #ef4444;"><input type="checkbox" id="show-lips" checked> Lips</label>
        </div>
        
        <div class="control-row">
            <span class="control-label-group">Stream Panel A Hand:</span>
            <label class="toggle-item" style="color: #ef4444;"><input type="checkbox" id="pa-wrist" checked> Wrist</label>
            <label class="toggle-item" style="color: #f97316;"><input type="checkbox" id="pa-thumb" checked> Thumb</label>
            <label class="toggle-item" style="color: #eab308;"><input type="checkbox" id="pa-index" checked> Index</label>
            <label class="toggle-item" style="color: #22c55e;"><input type="checkbox" id="pa-middle" checked> Middle</label>
            <label class="toggle-item" style="color: #3b82f6;"><input type="checkbox" id="pa-ring" checked> Ring</label>
            <label class="toggle-item" style="color: #a855f7;"><input type="checkbox" id="pa-pinky" checked> Pinky</label>
        </div>

        <div class="control-row">
            <span class="control-label-group">Stream Panel B Hand:</span>
            <label class="toggle-item" style="color: #ef4444;"><input type="checkbox" id="pb-wrist" checked> Wrist</label>
            <label class="toggle-item" style="color: #f97316;"><input type="checkbox" id="pb-thumb" checked> Thumb</label>
            <label class="toggle-item" style="color: #eab308;"><input type="checkbox" id="pb-index" checked> Index</label>
            <label class="toggle-item" style="color: #22c55e;"><input type="checkbox" id="pb-middle" checked> Middle</label>
            <label class="toggle-item" style="color: #3b82f6;"><input type="checkbox" id="pb-ring" checked> Ring</label>
            <label class="toggle-item" style="color: #a855f7;"><input type="checkbox" id="pb-pinky" checked> Pinky</label>
        </div>
    </div>

    <div id="app-layout">
        <div id="container">
            <div id="fps-counter">FPS: --</div>
            <video id="webcam" width="960" height="540" autoplay playsinline></video>
            <canvas id="output_canvas" width="960" height="540"></canvas>
        </div>

        <div class="slim-data-bar" id="panel-a-container">
            <div class="panel-label">Stream Panel A:</div>
            <div id="left-data" class="horizontal-content-wrapper">
                <div class="status-msg-inline">NO HAND DETECTED</div>
            </div>
        </div>

        <div class="slim-data-bar" id="panel-b-container">
            <div class="panel-label">Stream Panel B:</div>
            <div id="right-data" class="horizontal-content-wrapper">
                <div class="status-msg-inline">NO HAND DETECTED</div>
            </div>
        </div>

        <div class="slim-data-bar" id="face-tracking-panel">
            <div class="panel-label">Facial Coordinates:</div>
            <div id="face-data" class="horizontal-content-wrapper">
                <div class="status-msg-inline">NO FACE DETECTED</div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const leftData = document.getElementById('left-data');
        const rightData = document.getElementById('right-data');
        const faceData = document.getElementById('face-data');
        const fpsCounter = document.getElementById('fps-counter');

        const checkboxes = {
            leftEye: document.getElementById('show-lefteye'),
            rightEye: document.getElementById('show-righteye'),
            lips: document.getElementById('show-lips'),
            panelA: {
                wrist: document.getElementById('pa-wrist'),
                thumb: document.getElementById('pa-thumb'),
                index: document.getElementById('pa-index'),
                middle: document.getElementById('pa-middle'),
                ring: document.getElementById('pa-ring'),
                pinky: document.getElementById('pa-pinky')
            },
            panelB: {
                wrist: document.getElementById('pb-wrist'),
                thumb: document.getElementById('pb-thumb'),
                index: document.getElementById('pb-index'),
                middle: document.getElementById('pb-middle'),
                ring: document.getElementById('pb-ring'),
                pinky: document.getElementById('pb-pinky')
            }
        };

        const landmarkGroups = [
            { name: "Wrist Base", indices: [0], color: '#ef4444', key: 'wrist' },
            { name: "Thumb", indices: [1, 2, 3, 4], color: '#f97316', key: 'thumb' },
            { name: "Index Finger", indices: [5, 6, 7, 8], color: '#eab308', key: 'index' },
            { name: "Middle Finger", indices: [9, 10, 11, 12], color: '#22c55e', key: 'middle' },
            { name: "Ring Finger", indices: [13, 14, 15, 16], color: '#3b82f6', key: 'ring' },
            { name: "Pinky Finger", indices: [17, 18, 19, 20], color: '#a855f7', key: 'pinky' }
        ];

        const leftEyeLayout = [
            { id: 159, label: "Top" },
            { id: 145, label: "Bottom" }
        ];

        const rightEyeLayout = [
            { id: 386, label: "Top" },
            { id: 374, label: "Bottom" }
        ];

        const lipsLayout = [
            { id: 0,   label: "Top" },
            { id: 17,  label: "Bottom" },
            { id: 61,  label: "Left" },
            { id: 291, label: "Right" }
        ];

        let activeTracks = { panelA: null, panelB: null };
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let fps = 0;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now >= lastFrameTime + 1000) {
                fps = Math.round((frameCount * 1000) / (now - lastFrameTime));
                fpsCounter.innerText = `FPS: ${fps}`;
                frameCount = 0;
                lastFrameTime = now;
            }
        }

        function drawCustomConnections(ctx, landmarks, connections, color, trackingKey, panelKey) {
            if (!landmarks || !checkboxes[panelKey][trackingKey].checked) return;
            for (const connection of connections) {
                const first = landmarks[connection[0]];
                const second = landmarks[connection[1]];
                if (first && second) {
                    ctx.beginPath();
                    ctx.moveTo(first.x * canvasElement.width, first.y * canvasElement.height);
                    ctx.lineTo(second.x * canvasElement.width, second.y * canvasElement.height);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
        }

        function drawHandPoints(ctx, landmarks, panelKey) {
            if (!landmarks) return;
            landmarkGroups.forEach(group => {
                if (checkboxes[panelKey][group.key].checked) {
                    group.indices.forEach(i => {
                        if (landmarks[i]) {
                            ctx.beginPath();
                            ctx.arc(landmarks[i].x * canvasElement.width, landmarks[i].y * canvasElement.height, 4, 0, 2 * Math.PI);
                            ctx.fillStyle = group.color;
                            ctx.fill();
                        }
                    });
                }
            });
        }

        function drawFaceLayoutPoints(ctx, landmarks, layout, color, enabled) {
            if (!landmarks || !enabled) return;
            layout.forEach(item => {
                const pt = landmarks[item.id];
                if (pt) {
                    ctx.beginPath();
                    ctx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = color;
                    ctx.fill();
                }
            });
        }

        function generateHandHTML(landmarks, panelKey) {
            let htmlContent = "";
            let elementsLogged = 0;
            
            landmarkGroups.forEach(group => {
                if (checkboxes[panelKey][group.key].checked) {
                    elementsLogged++;
                    htmlContent += `<div class="finger-pill" data-group="${group.name}">`;
                    htmlContent += `<span class="pill-title">${group.name}</span>`;
                    
                    let coordsStrings = [];
                    group.indices.forEach(i => {
                        const pt = landmarks[i];
                        coordsStrings.push(`P${i}[${pt.x.toFixed(2)},${pt.y.toFixed(2)}]`);
                    });
                    
                    htmlContent += `<span class="pill-coords">${coordsStrings.join(' ')}</span>`;
                    htmlContent += `</div>`;
                }
            });
            
            if(elementsLogged === 0) {
                htmlContent = `<div class="status-msg-inline">ALL MODULES MUTED</div>`;
            }
            
            return htmlContent;
        }

        function generateFaceHTML(faceLandmarks, layout, segmentTitle, dataGroupType, enabled) {
            if (!faceLandmarks || !enabled) return '';
            let htmlContent = `<div class="finger-pill" data-group="${dataGroupType}">`;
            htmlContent += `<span class="pill-title">${segmentTitle}</span>`;
            
            let coordsStrings = [];
            layout.forEach(item => {
                const pt = faceLandmarks[item.id];
                if (pt) {
                    coordsStrings.push(`${item.label}[${pt.x.toFixed(2)},${pt.y.toFixed(2)}]`);
                }
            });
            
            htmlContent += `<span class="pill-coords">${coordsStrings.join(' ')}</span>`;
            htmlContent += `</div>`;
            return htmlContent;
        }

        function onResults(results) {
            updateFPS();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            canvasCtx.save();
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.faceLandmarks) {
                drawFaceLayoutPoints(canvasCtx, results.faceLandmarks, leftEyeLayout, '#22d3ee', checkboxes.leftEye.checked);
                drawFaceLayoutPoints(canvasCtx, results.faceLandmarks, rightEyeLayout, '#c084fc', checkboxes.rightEye.checked);
                drawFaceLayoutPoints(canvasCtx, results.faceLandmarks, lipsLayout, '#ef4444', checkboxes.lips.checked);

                let faceHTML = "";
                faceHTML += generateFaceHTML(results.faceLandmarks, leftEyeLayout, "Left Eye", "Face-LeftEye", checkboxes.leftEye.checked);
                faceHTML += generateFaceHTML(results.faceLandmarks, rightEyeLayout, "Right Eye", "Face-RightEye", checkboxes.rightEye.checked);
                faceHTML += generateFaceHTML(results.faceLandmarks, lipsLayout, "Lips", "Face-Lips", checkboxes.lips.checked);
                
                if(!checkboxes.leftEye.checked && !checkboxes.rightEye.checked && !checkboxes.lips.checked) {
                     faceHTML = `<div class="status-msg-inline">ALL FACIAL MODULES MUTED</div>`;
                }
                faceData.innerHTML = faceHTML;
            } else {
                faceData.innerHTML = `<div class="status-msg-inline">NO FACE DETECTED</div>`;
            }

            let currentFrameHands = [];
            if (results.leftHandLandmarks) currentFrameHands.push(results.leftHandLandmarks);
            if (results.rightHandLandmarks) currentFrameHands.push(results.rightHandLandmarks);

            let assignedPanelA = null;
            let assignedPanelB = null;

            if (currentFrameHands.length === 0) {
                activeTracks.panelA = null;
                activeTracks.panelB = null;
            } else {
                let handPool = [...currentFrameHands];
                if (activeTracks.panelA) {
                    let bestIdx = -1, minDist = 0.15;
                    for (let i = 0; i < handPool.length; i++) {
                        let dist = Math.hypot(handPool[i][0].x - activeTracks.panelA.x, handPool[i][0].y - activeTracks.panelA.y);
                        if (dist < minDist) { minDist = dist; bestIdx = i; }
                    }
                    if (bestIdx !== -1) {
                        assignedPanelA = handPool.splice(bestIdx, 1)[0];
                        activeTracks.panelA = { x: assignedPanelA[0].x, y: assignedPanelA[0].y };
                    } else { activeTracks.panelA = null; }
                }
                if (activeTracks.panelB && handPool.length > 0) {
                    let bestIdx = -1, minDist = 0.15;
                    for (let i = 0; i < handPool.length; i++) {
                        let dist = Math.hypot(handPool[i][0].x - activeTracks.panelB.x, handPool[i][0].y - activeTracks.panelB.y);
                        if (dist < minDist) { minDist = dist; bestIdx = i; }
                    }
                    if (bestIdx !== -1) {
                        assignedPanelB = handPool.splice(bestIdx, 1)[0];
                        activeTracks.panelB = { x: assignedPanelB[0].x, y: assignedPanelB[0].y };
                    } else { activeTracks.panelB = null; }
                }
                while (handPool.length > 0) {
                    let newHand = handPool.shift();
                    if (!assignedPanelA && !activeTracks.panelA && !assignedPanelB && (newHand[0].x > 0.5)) {
                        assignedPanelA = newHand;
                        activeTracks.panelA = { x: newHand[0].x, y: newHand[0].y };
                    } else if (!assignedPanelB && !activeTracks.panelB) {
                        assignedPanelB = newHand;
                        activeTracks.panelB = { x: newHand[0].x, y: newHand[0].y };
                    } else if (!assignedPanelA && !activeTracks.panelA) {
                        assignedPanelA = newHand;
                        activeTracks.panelA = { x: newHand[0].x, y: newHand[0].y };
                    }
                }
            }

            if (assignedPanelA) {
                drawCustomConnections(canvasCtx, assignedPanelA, [[0, 1], [1, 2], [2, 3], [3, 4]], '#f97316', 'thumb', 'panelA');
                drawCustomConnections(canvasCtx, assignedPanelA, [[0, 5], [5, 6], [6, 7], [7, 8]], '#eab308', 'index', 'panelA');
                drawCustomConnections(canvasCtx, assignedPanelA, [[9, 10], [10, 11], [11, 12], [0, 9]], '#22c55e', 'middle', 'panelA');
                drawCustomConnections(canvasCtx, assignedPanelA, [[13, 14], [14, 15], [15, 16], [0, 13]], '#3b82f6', 'ring', 'panelA');
                drawCustomConnections(canvasCtx, assignedPanelA, [[17, 18], [18, 19], [19, 20], [0, 17]], '#a855f7', 'pinky', 'panelA');
                drawHandPoints(canvasCtx, assignedPanelA, 'panelA');
                leftData.innerHTML = generateHandHTML(assignedPanelA, 'panelA');
            } else {
                leftData.innerHTML = `<div class="status-msg-inline">NO HAND DETECTED</div>`;
            }

            if (assignedPanelB) {
                drawCustomConnections(canvasCtx, assignedPanelB, [[0, 1], [1, 2], [2, 3], [3, 4]], '#f97316', 'thumb', 'panelB');
                drawCustomConnections(canvasCtx, assignedPanelB, [[0, 5], [5, 6], [6, 7], [7, 8]], '#eab308', 'index', 'panelB');
                drawCustomConnections(canvasCtx, assignedPanelB, [[9, 10], [10, 11], [11, 12], [0, 9]], '#22c55e', 'middle', 'panelB');
                drawCustomConnections(canvasCtx, assignedPanelB, [[13, 14], [14, 15], [15, 16], [0, 13]], '#3b82f6', 'ring', 'panelB');
                drawCustomConnections(canvasCtx, assignedPanelB, [[17, 18], [18, 19], [19, 20], [0, 17]], '#a855f7', 'pinky', 'panelB');
                drawHandPoints(canvasCtx, assignedPanelB, 'panelB');
                rightData.innerHTML = generateHandHTML(assignedPanelB, 'panelB');
            } else {
                rightData.innerHTML = `<div class="status-msg-inline">NO HAND DETECTED</div>`;
            }

            canvasCtx.restore();
        }

        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
        });

        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        holistic.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await holistic.send({ image: videoElement });
            },
            width: 960,
            height: 540
        });
        camera.start();
    </script>
</body>

</html>
