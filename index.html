<!DOCTYPE html>
<html>

<head>
    <title>ParkinsonHandTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #09090b;
            color: #fafafa;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a1a1aa;
        }

        #app-layout {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 15px;
            max-width: 1600px;
            margin: 0 auto;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            flex-shrink: 0;
            background: #000;
        }

        video,
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            transform: rotateY(180deg);
        }

        #fps-counter {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(18, 18, 20, 0.85);
            color: #00ff00;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .hand-column {
            flex: 1;
            background: #121214;
            padding: 12px;
            height: 520px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .hand-column::-webkit-scrollbar {
            width: 6px;
        }
        .hand-column::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 3px;
        }

        .hand-header {
            font-size: 15px;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #27272a;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .status-msg {
            color: #52525b;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: auto;
            text-align: center;
        }

        .data-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .finger-group {
            background: #18181b;
            border-radius: 4px;
            padding: 6px 8px;
        }

        .finger-group[data-group="Wrist Base"] { border: 1px solid #ef4444; }
        .finger-group[data-group="Thumb"] { border: 1px solid #f97316; }
        .finger-group[data-group="Index Finger"] { border: 1px solid #eab308; }
        .finger-group[data-group="Middle Finger"] { border: 1px solid #22c55e; }
        .finger-group[data-group="Ring Finger"] { border: 1px solid #3b82f6; }
        .finger-group[data-group="Pinky Finger"] { border: 1px solid #a855f7; }
        .finger-group[data-group="Facial Module"] { border: 1px solid #a1a1aa; }

        .finger-title {
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #27272a;
        }

        .finger-group[data-group="Wrist Base"] .finger-title { color: #ef4444; }
        .finger-group[data-group="Thumb"] .finger-title { color: #f97316; }
        .finger-group[data-group="Index Finger"] .finger-title { color: #eab308; }
        .finger-group[data-group="Middle Finger"] .finger-title { color: #22c55e; }
        .finger-group[data-group="Ring Finger"] .finger-title { color: #3b82f6; }
        .finger-group[data-group="Pinky Finger"] .finger-title { color: #a855f7; }
        .finger-group[data-group="Facial Module"] .finger-title { color: #e4e4e7; }

        .coord-line {
            font-family: monospace;
            font-size: 10px;
            line-height: 1.3;
            color: #a1a1aa;
            display: flex;
            justify-content: space-between;
        }

        .coord-values {
            color: #fafafa;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>ParkinsonHandTrack</h2>

    <div id="app-layout">
        <div class="hand-column" id="left-column">
            <div id="left-data" class="status-msg">NO DATA DETECTED</div>
        </div>

        <div id="container">
            <div id="fps-counter">FPS: --</div>
            <video id="webcam" width="640" height="480" autoplay playsinline></video>
            <canvas id="output_canvas" width="640" height="480"></canvas>
        </div>

        <div class="hand-column" id="right-column">
            <div id="right-data" class="status-msg">NO DATA DETECTED</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const leftData = document.getElementById('left-data');
        const rightData = document.getElementById('right-data');
        const fpsCounter = document.getElementById('fps-counter');

        const landmarkGroups = [
            { name: "Wrist Base", indices: [0], color: '#ef4444' },
            { name: "Thumb", indices: [1, 2, 3, 4], color: '#f97316' },
            { name: "Index Finger", indices: [5, 6, 7, 8], color: '#eab308' },
            { name: "Middle Finger", indices: [9, 10, 11, 12], color: '#22c55e' },
            { name: "Ring Finger", indices: [13, 14, 15, 16], color: '#3b82f6' },
            { name: "Pinky Finger", indices: [17, 18, 19, 20], color: '#a855f7' }
        ];

        // Specific isolated landmarks mapped directly to names for easy understanding
        const leftEyeLayout = [
            { id: 159, label: "Top" },
            { id: 145, label: "Bottom" }
        ];

        const rightEyeLayout = [
            { id: 386, label: "Top" },
            { id: 374, label: "Bottom" }
        ];

        const lipsLayout = [
            { id: 0,   label: "Top" },
            { id: 17,  label: "Bottom" },
            { id: 61,  label: "Left" },
            { id: 291, label: "Right" }
        ];

        let activeTracks = { panelA: null, panelB: null };
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let fps = 0;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now >= lastFrameTime + 1000) {
                fps = Math.round((frameCount * 1000) / (now - lastFrameTime));
                fpsCounter.innerText = `FPS: ${fps}`;
                frameCount = 0;
                lastFrameTime = now;
            }
        }

        function drawCustomConnections(ctx, landmarks, connections, color) {
            if (!landmarks) return;
            for (const connection of connections) {
                const first = landmarks[connection[0]];
                const second = landmarks[connection[1]];
                if (first && second) {
                    ctx.beginPath();
                    ctx.moveTo(first.x * canvasElement.width, first.y * canvasElement.height);
                    ctx.lineTo(second.x * canvasElement.width, second.y * canvasElement.height);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
        }

        function drawHandPoints(ctx, landmarks) {
            if (!landmarks) return;
            landmarkGroups.forEach(group => {
                group.indices.forEach(i => {
                    if (landmarks[i]) {
                        ctx.beginPath();
                        ctx.arc(landmarks[i].x * canvasElement.width, landmarks[i].y * canvasElement.height, 4, 0, 2 * Math.PI);
                        ctx.fillStyle = group.color;
                        ctx.fill();
                    }
                });
            });
        }

        function drawFaceLayoutPoints(ctx, landmarks, layout, color) {
            if (!landmarks) return;
            layout.forEach(item => {
                const pt = landmarks[item.id];
                if (pt) {
                    ctx.beginPath();
                    ctx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = color;
                    ctx.fill();
                }
            });
        }

        function generateHandHTML(landmarks, title) {
            let htmlContent = `<div class="data-grid">`;
            landmarkGroups.forEach(group => {
                htmlContent += `<div class="finger-group" data-group="${group.name}">`;
                htmlContent += `<div class="finger-title">${group.name}</div>`;
                group.indices.forEach(i => {
                    const pt = landmarks[i];
                    htmlContent += `
                    <div class="coord-line">
                        <span>P${i}:</span>
                        <span class="coord-values">X:${pt.x.toFixed(2)} Y:${pt.y.toFixed(2)} Z:${pt.z.toFixed(2)}</span>
                    </div>`;
                });
                htmlContent += `</div>`;
            });
            htmlContent += `</div>`;
            return htmlContent;
        }

        function generateFaceHTML(faceLandmarks, layout, segmentTitle) {
            if (!faceLandmarks) return '';
            let htmlContent = `<div class="finger-group" data-group="Facial Module">`;
            htmlContent += `<div class="finger-title">${segmentTitle}</div>`;
            layout.forEach(item => {
                const pt = faceLandmarks[item.id];
                if (pt) {
                    htmlContent += `
                    <div class="coord-line">
                        <span>${item.label}:</span>
                        <span class="coord-values">X:${pt.x.toFixed(2)} Y:${pt.y.toFixed(2)} Z:${pt.z.toFixed(2)}</span>
                    </div>`;
                }
            });
            htmlContent += `</div>`;
            return htmlContent;
        }

        function onResults(results) {
            updateFPS();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            canvasCtx.save();
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 1. Plot Isolated Custom Facial Feature Points
            if (results.faceLandmarks) {
                drawFaceLayoutPoints(canvasCtx, results.faceLandmarks, leftEyeLayout, '#3b82f6');
                drawFaceLayoutPoints(canvasCtx, results.faceLandmarks, rightEyeLayout, '#3b82f6');
                drawFaceLayoutPoints(canvasCtx, results.faceLandmarks, lipsLayout, '#ef4444');
            }

            // 2. Hand Telemetry Assignment
            let currentFrameHands = [];
            if (results.leftHandLandmarks) currentFrameHands.push(results.leftHandLandmarks);
            if (results.rightHandLandmarks) currentFrameHands.push(results.rightHandLandmarks);

            let assignedPanelA = null;
            let assignedPanelB = null;

            if (currentFrameHands.length === 0) {
                activeTracks.panelA = null;
                activeTracks.panelB = null;
            } else {
                let handPool = [...currentFrameHands];
                if (activeTracks.panelA) {
                    let bestIdx = -1, minDist = 0.15;
                    for (let i = 0; i < handPool.length; i++) {
                        let dist = Math.hypot(handPool[i][0].x - activeTracks.panelA.x, handPool[i][0].y - activeTracks.panelA.y);
                        if (dist < minDist) { minDist = dist; bestIdx = i; }
                    }
                    if (bestIdx !== -1) {
                        assignedPanelA = handPool.splice(bestIdx, 1)[0];
                        activeTracks.panelA = { x: assignedPanelA[0].x, y: assignedPanelA[0].y };
                    } else { activeTracks.panelA = null; }
                }
                if (activeTracks.panelB && handPool.length > 0) {
                    let bestIdx = -1, minDist = 0.15;
                    for (let i = 0; i < handPool.length; i++) {
                        let dist = Math.hypot(handPool[i][0].x - activeTracks.panelB.x, handPool[i][0].y - activeTracks.panelB.y);
                        if (dist < minDist) { minDist = dist; bestIdx = i; }
                    }
                    if (bestIdx !== -1) {
                        assignedPanelB = handPool.splice(bestIdx, 1)[0];
                        activeTracks.panelB = { x: assignedPanelB[0].x, y: assignedPanelB[0].y };
                    } else { activeTracks.panelB = null; }
                }
                while (handPool.length > 0) {
                    let newHand = handPool.shift();
                    if (!assignedPanelA && !activeTracks.panelA && !assignedPanelB && (newHand[0].x > 0.5)) {
                        assignedPanelA = newHand;
                        activeTracks.panelA = { x: newHand[0].x, y: newHand[0].y };
                    } else if (!assignedPanelB && !activeTracks.panelB) {
                        assignedPanelB = newHand;
                        activeTracks.panelB = { x: newHand[0].x, y: newHand[0].y };
                    } else if (!assignedPanelA && !activeTracks.panelA) {
                        assignedPanelA = newHand;
                        activeTracks.panelA = { x: newHand[0].x, y: newHand[0].y };
                    }
                }
            }

            // --- RENDER COLUMN A ---
            let panelA_HTML = `<div class="hand-header">Stream Panel A</div><div class="data-grid">`;
            if (results.faceLandmarks) {
                panelA_HTML += generateFaceHTML(results.faceLandmarks, leftEyeLayout, "Left Eye Coordinates");
            }
            if (assignedPanelA) {
                drawCustomConnections(canvasCtx, assignedPanelA, [[0, 1], [1, 2], [2, 3], [3, 4]], '#f97316');
                drawCustomConnections(canvasCtx, assignedPanelA, [[0, 5], [5, 6], [6, 7], [7, 8]], '#eab308');
                drawCustomConnections(canvasCtx, assignedPanelA, [[9, 10], [10, 11], [11, 12], [0, 9]], '#22c55e');
                drawCustomConnections(canvasCtx, assignedPanelA, [[13, 14], [14, 15], [15, 16], [0, 13]], '#3b82f6');
                drawCustomConnections(canvasCtx, assignedPanelA, [[17, 18], [18, 19], [19, 20], [0, 17]], '#a855f7');
                drawHandPoints(canvasCtx, assignedPanelA);
                panelA_HTML += generateHandHTML(assignedPanelA, "Stream Panel A");
            } else {
                panelA_HTML += `<div class="status-msg" style="padding:20px 0;">NO HAND DETECTED</div>`;
            }
            panelA_HTML += `</div>`;
            leftData.className = "";
            leftData.innerHTML = panelA_HTML;

            // --- RENDER COLUMN B ---
            let panelB_HTML = `<div class="hand-header">Stream Panel B</div><div class="data-grid">`;
            if (results.faceLandmarks) {
                panelB_HTML += generateFaceHTML(results.faceLandmarks, rightEyeLayout, "Right Eye Coordinates");
                panelB_HTML += generateFaceHTML(results.faceLandmarks, lipsLayout, "Lips Coordinates");
            }
            if (assignedPanelB) {
                drawCustomConnections(canvasCtx, assignedPanelB, [[0, 1], [1, 2], [2, 3], [3, 4]], '#f97316');
                drawCustomConnections(canvasCtx, assignedPanelB, [[0, 5], [5, 6], [7, 8]], '#eab308');
                drawCustomConnections(canvasCtx, assignedPanelB, [[9, 10], [10, 11], [11, 12], [0, 9]], '#22c55e');
                drawCustomConnections(canvasCtx, assignedPanelB, [[13, 14], [14, 15], [15, 16], [0, 13]], '#3b82f6');
                drawCustomConnections(canvasCtx, assignedPanelB, [[17, 18], [18, 19], [19, 20], [0, 17]], '#a855f7');
                drawHandPoints(canvasCtx, assignedPanelB);
                panelB_HTML += generateHandHTML(assignedPanelB, "Stream Panel B");
            } else {
                panelB_HTML += `<div class="status-msg" style="padding:20px 0;">NO HAND DETECTED</div>`;
            }
            panelB_HTML += `</div>`;
            rightData.className = "";
            rightData.innerHTML = panelB_HTML;

            canvasCtx.restore();
        }

        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
        });

        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        holistic.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await holistic.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>

</html>
